# Local, self-contained stack. The gateway runs fully offline with the in-process
# mock provider + mock agent -- no external services required.
#
#     docker compose up --build
#     open http://localhost:8080/ui/
#
services:
  gateway:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: nth-voice-gateway:latest
    ports:
      - "8080:8080"
    environment:
      DEFAULT_PROVIDER: mock
      USE_MOCK_AGENT: "true"
      LOG_LEVEL: INFO
      ENABLE_CACHING: "true"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/health').status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # --- Optional: uncomment to point the gateway at a standalone mock agent ----
  # mock-agent:
  #   build: { context: ./mock-services, dockerfile: Dockerfile.agent }
  #   ports: ["9000:9000"]
