name: CI/CD — Tax Agent

# On every push to main: test -> build image -> push to GHCR -> deploy to EC2.
# The deploy job skips gracefully until the EC2 secrets are configured, so the
# pipeline is green from day one and turns into full CD once you add them.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------- tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run test suite
        working-directory: backend
        run: python -m pytest -q

  # ------------------------------------------------------- build & push image
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.name.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      # Required so buildx uses the container driver, which supports the
      # type=gha cache backend below (the default docker driver does not).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image name (GHCR requires lowercase)
        id: name
        run: echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tax-agent" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.name.outputs.image }}:latest
            ${{ steps.name.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------ deploy to EC2
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check that EC2 secrets are configured
        id: gate
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "::notice::EC2 secrets not set yet — skipping deploy. Add EC2_HOST/EC2_USER/EC2_SSH_KEY to enable CD."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy over SSH
        if: steps.gate.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tax-agent:latest
            echo "Pulling $IMAGE"
            docker pull "$IMAGE"
            # Stop whatever currently holds port 8080 (incl. the manually-started
            # container), then run the fresh image.
            docker ps --filter publish=8080 -q | xargs -r docker rm -f
            docker rm -f tax-agent 2>/dev/null || true
            # Named volume persists conversations/audit across deploys AND keeps
            # the app's non-root user (uid 10001) able to write (bind mounts would
            # inherit host ownership and break that).
            docker run -d --name tax-agent --restart unless-stopped \
              -p 8080:8080 \
              -e LLM_PROVIDER=mock \
              -v tax-agent-data:/app/backend/data \
              "$IMAGE"
            docker image prune -f
            echo "Deployed. Health:"
            sleep 4 && curl -fsS http://localhost:8080/health | head -c 200 || echo "health check pending"
