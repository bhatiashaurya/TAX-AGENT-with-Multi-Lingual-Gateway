name: CI/CD — Tax Agent

# On every push to main: test -> build image -> push to GHCR -> deploy to EC2.
# The deploy job skips gracefully until the EC2 secrets are configured, so the
# pipeline is green from day one and turns into full CD once you add them.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

# Serialize runs on the same ref so two quick pushes never race two deploys
# onto the instance (a mid-deploy must finish before the next one starts).
concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------- tests
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/requirements.txt
      - name: Run test suite
        working-directory: backend
        run: python -m pytest -q

  # ------------------------------------------------------- build & push image
  build:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.name.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      # Required so buildx uses the container driver, which supports the
      # type=gha cache backend below (the default docker driver does not).
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute lowercase image name (GHCR requires lowercase)
        id: name
        run: echo "image=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tax-agent" >> "$GITHUB_OUTPUT"
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ steps.name.outputs.image }}:latest
            ${{ steps.name.outputs.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ------------------------------------------------------------ deploy to EC2
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Check that EC2 secrets are configured
        id: gate
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "::notice::EC2 secrets not set yet — skipping deploy. Add EC2_HOST/EC2_USER/EC2_SSH_KEY to enable CD."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy over SSH
        if: steps.gate.outputs.ready == 'true'
        uses: appleboy/ssh-action@v1.2.0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # Forward the keys (if set) into the remote script without echoing them.
          envs: ANTHROPIC_API_KEY,GROQ_API_KEY,GROQ_MODEL
          script: |
            set -e
            IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/tax-agent:latest
            echo "Pulling $IMAGE"
            docker pull "$IMAGE"
            # Stop whatever currently holds port 8080 (incl. the manually-started
            # container), then run the fresh image.
            docker ps --filter publish=8080 -q | xargs -r docker rm -f
            docker rm -f tax-agent 2>/dev/null || true
            # Pick the LLM from whichever key is configured (Groq preferred as a
            # free option, then Claude), else the offline mock. Keys are passed as
            # runtime env, never baked into the image.
            if [ -n "${GROQ_API_KEY:-}" ]; then
              echo "LLM: groq (${GROQ_MODEL:-llama-3.3-70b-versatile})"
              LLM_ENV="-e LLM_PROVIDER=groq -e GROQ_API_KEY=${GROQ_API_KEY} -e GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}"
            elif [ -n "${ANTHROPIC_API_KEY:-}" ]; then
              echo "LLM: anthropic (Claude)"
              LLM_ENV="-e LLM_PROVIDER=anthropic -e ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
            else
              echo "LLM: mock (offline) — add a GROQ_API_KEY or ANTHROPIC_API_KEY secret for a real model"
              LLM_ENV="-e LLM_PROVIDER=mock"
            fi
            # Named volume persists conversations/audit across deploys AND keeps
            # the app's non-root user (uid 10001) able to write (bind mounts would
            # inherit host ownership and break that).
            docker run -d --name tax-agent --restart unless-stopped \
              -p 8080:8080 \
              $LLM_ENV \
              -v tax-agent-data:/app/backend/data \
              "$IMAGE"
            docker image prune -f
            echo "Waiting for the new container to become healthy..."
            for i in $(seq 1 15); do
              if curl -fsS http://localhost:8080/health >/dev/null 2>&1; then
                echo "Healthy:"; curl -s http://localhost:8080/health | head -c 200; echo
                exit 0
              fi
              sleep 2
            done
            echo "ERROR: new container did not become healthy in time" >&2
            docker logs --tail 50 tax-agent || true
            exit 1
